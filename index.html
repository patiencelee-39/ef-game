    <style>
      /* Landing Page 專用樣式 */
      body {
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .landing {
        text-align: center;
        max-width: 700px;
        width: 100%;
        padding: var(--spacing-xl);
      }
      .landing__logo {
        font-size: 5rem;
        margin-bottom: var(--spacing-md);
        animation: landing-bounce 2s ease-in-out infinite;
      }
      @keyframes landing-bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .landing__title {
        font-size: clamp(2rem, 6vw, 3rem);
        color: var(--text-white);
        margin-bottom: var(--spacing-sm);
        text-shadow: 0 2px 15px rgba(52, 152, 219, 0.5);
      }
      .landing__subtitle {
        font-size: clamp(1rem, 3vw, 1.3rem);
        color: var(--text-light);
        margin-bottom: var(--spacing-lg);
        opacity: 0.9;
      }
      .landing__desc {
        color: rgba(255, 255, 255, 0.75);
        font-size: clamp(0.85rem, 2.5vw, 1.05rem);
        line-height: 1.8;
        margin-bottom: var(--spacing-xl);
        text-align: left;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--border-radius-lg);
        padding: var(--spacing-md) var(--spacing-lg);
      }
      .landing__desc strong {
        color: var(--accent-yellow);
      }
      .landing__features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-xl);
      }
      .landing__feature {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--border-radius-md);
        padding: var(--spacing-sm);
        text-align: center;
      }
      .landing__feature-icon {
        font-size: 2rem;
        margin-bottom: 4px;
      }
      .landing__feature-text {
        font-size: 0.85rem;
        color: var(--text-light);
      }
      .landing__enter-btn {
        display: inline-block;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-size: clamp(1.2rem, 3vw, 1.5rem);
        font-weight: bold;
        padding: 16px 48px;
        border-radius: 50px;
        text-decoration: none;
        box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        transition: all 0.3s ease;
        animation: landing-pulse 2.5s ease-in-out infinite;
      }
      .landing__enter-btn:hover,
      .landing__enter-btn:focus-visible {
        transform: scale(1.05);
        box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
      }
      @keyframes landing-pulse {
        0%,
        100% {
          box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        50% {
          box-shadow: 0 4px 30px rgba(102, 126, 234, 0.7);
        }
      }
      .landing footer {
        margin-top: var(--spacing-xl);
        opacity: 0.6;
        font-size: 0.8rem;
      }
    </style>

    <!-- Firebase Bundle -->
    <script defer src="js/firebase-bundle.js"></script>

    <a href="#main-content" class="skip-link">跳到主要內容</a>
    <div class="landing" id="main-content">
      <div class="landing__logo" aria-hidden="true">🎮</div>
      <h1 class="landing__title">執行功能訓練遊戲</h1>
      <p class="landing__subtitle">專為 3–6 歲聽障學齡前幼兒設計</p>

      <div class="landing__desc">
        本遊戲是一套<strong>認知訓練系統</strong>，以研究為基礎，透過有趣的互動遊戲，協助聽障幼兒訓練三大核心執行功能：
        <strong>抑制控制</strong
        >（Go/No-Go）、<strong>認知彈性</strong>（規則轉換）、<strong>工作記憶</strong>（序列回想）。
        遊戲包含探險闖關、多人競賽、虛擬養雞場等多元獎勵機制，讓孩子在遊玩中提升認知能力。
      </div>

      <div class="landing__features">
        <div class="landing__feature">
          <div class="landing__feature-icon">🧠</div>
          <div class="landing__feature-text">三大執行功能訓練</div>
        </div>
        <div class="landing__feature">
          <div class="landing__feature-icon">🗺️</div>
          <div class="landing__feature-text">探險闖關模式</div>
        </div>
        <div class="landing__feature">
          <div class="landing__feature-icon">⚔️</div>
          <div class="landing__feature-text">多人即時競賽</div>
        </div>
        <div class="landing__feature">
          <div class="landing__feature-icon">🐔</div>
          <div class="landing__feature-text">虛擬寵物獎勵</div>
        </div>
      </div>

      <a class="landing__enter-btn" href="home.html">🚀 進入遊戲</a>

      <footer>
        <p>© 2026 執行功能訓練遊戲 | 學術研究專案</p>

        </p>
