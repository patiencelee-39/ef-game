<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://*.firebasedatabase.app https://*.firebaseio.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com https://*.firebasedatabase.app wss://*.firebasedatabase.app"
    />
    <title>加入房間 - 執行功能訓練遊戲</title>
    <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="../favicon.svg" />
    <link rel="manifest" href="../manifest.json" />
    <meta name="theme-color" content="#302b63" />
    <link rel="stylesheet" href="../css/themes/base.css" />
    <link rel="stylesheet" href="../css/themes/theme-field-primary.css" />
    <link rel="stylesheet" href="../css/themes/theme-rule-independent.css" />
    <script src="../js/utils/theme-init.js"></script>
    <link rel="stylesheet" href="../css/main.css" />
    <link
      rel="preload"
      href="../css/components/landscape-hint.css"
      as="style"
      onload="this.rel = 'stylesheet'"
    />
    <noscript
      ><link rel="stylesheet" href="../css/components/landscape-hint.css"
    /></noscript>
    <link rel="stylesheet" href="../css/pages/room-join.css" />
    <link
      rel="preload"
      href="../css/components/navbar.css"
      as="style"
      onload="this.rel = 'stylesheet'"
    />
    <noscript
      ><link rel="stylesheet" href="../css/components/navbar.css"
    /></noscript>
    <!-- Firebase Bundle -->
    <script defer src="../js/firebase-bundle.js"></script>
    <script defer src="../js/utils/logger.js"></script>
    <!-- 應用程式腳本 -->
    <script defer src="../js/utils/constants.js"></script>
    <script defer src="../js/utils/room-code.js"></script>
    <script defer src="../js/multiplayer/room-manager.js"></script>
    <script defer src="../js/shared/game-modal.js"></script>
    <script defer src="../js/shared/navbar.js"></script>
    <script defer src="../js/shared/landscape-hint.js"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">跳到主要內容</a>
    <div class="container">
      <header>
        <h1>🔗 加入房間</h1>
        <p class="subtitle">輸入房間代碼以加入遊戲</p>
      </header>

      <main class="join-container" id="main-content">
        <div class="form-group">
          <label for="playerName">您的名字</label>
          <input
            type="text"
            id="playerName"
            class="player-name-input"
            placeholder="輸入您的名字"
            maxlength="20"
          />
        </div>

        <div class="form-group">
          <label id="codeLabel">房間代碼</label>
          <div
            class="code-input-group"
            role="group"
            aria-labelledby="codeLabel"
          >
            <input
              type="text"
              class="code-input"
              id="code1"
              maxlength="1"
              autocomplete="off"
              aria-label="房間代碼第 1 碼"
            />
            <input
              type="text"
              class="code-input"
              id="code2"
              maxlength="1"
              autocomplete="off"
              aria-label="房間代碼第 2 碼"
            />
            <input
              type="text"
              class="code-input"
              id="code3"
              maxlength="1"
              autocomplete="off"
              aria-label="房間代碼第 3 碼"
            />
            <span class="code-separator" aria-hidden="true">-</span>
            <input
              type="text"
              class="code-input"
              id="code4"
              maxlength="1"
              autocomplete="off"
              aria-label="房間代碼第 4 碼"
            />
            <input
              type="text"
              class="code-input"
              id="code5"
              maxlength="1"
              autocomplete="off"
              aria-label="房間代碼第 5 碼"
            />
            <input
              type="text"
              class="code-input"
              id="code6"
              maxlength="1"
              autocomplete="off"
              aria-label="房間代碼第 6 碼"
            />
          </div>
        </div>

        <div class="loading" id="loading">正在尋找房間...</div>

        <div
          class="join-status"
          id="joinStatus"
          role="alert"
          aria-live="assertive"
        ></div>

        <div class="room-info" id="roomInfo">
          <h3>📋 房間資訊</h3>
          <div class="room-info-item">
            <span>房主：</span>
            <span id="roomHost">-</span>
          </div>
          <div class="room-info-item">
            <span>玩家人數：</span>
            <span id="playerCount">-</span>
          </div>
          <div class="room-info-item">
            <span>關卡數量：</span>
            <span id="stageCount">-</span>
          </div>
        </div>

        <div class="btn-group">
          <button
            class="btn-secondary"
            onclick="location.href = '../index.html'"
          >
            返回首頁
          </button>
          <button class="btn-primary" id="joinBtn" onclick="joinRoom()">
            加入房間
          </button>
        </div>
      </main>

      <footer>
        <p>&copy; 2026 執行功能訓練遊戲. All rights reserved.</p>
      </footer>
    </div>

    <script defer src="../js/multiplayer/room-join-controller.js"></script>
  </body>
</html>
