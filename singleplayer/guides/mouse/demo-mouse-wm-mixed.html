<!--
  demo-mouse-wm-mixed-slow.html v2
  工作記憶規則說明動畫（老鼠場・混合版）
  一輪 = 順向完整播放 → 逆向完整播放 → 循環
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>示範動畫 - 工作記憶（老鼠場・混合版）</title>
  <style>
    :root {
      --bg-color:#2c3e50; --game-bg:#34495e; --text-color:#ecf0f1;
      --success-color:#2ecc71; --error-color:#e74c3c;
      --primary-color:#3498db; --accent-yellow:#f39c12;
      --forward-color:#2ecc71; --reverse-color:#e67e22;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'微軟正黑體','Microsoft JhengHei','PingFang TC',sans-serif;
      background:var(--bg-color); color:var(--text-color);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; overflow:hidden;
    }
    .demo-container {
      background:var(--game-bg); border-radius:15px;
      width:100%; max-width:420px; min-height:620px;
      position:relative; overflow:hidden;
      box-shadow:0 4px 6px rgba(0,0,0,0.3);
      display:flex; flex-direction:column; align-items:center;
    }
    .game-scene { width:100%; display:flex; flex-direction:column; align-items:center; transition:opacity 0.5s; }
    .stimulus-container { position:relative; width:300px; height:400px; margin:10px auto 0; }
    .background-layer { position:absolute; width:100%; height:100%; z-index:1; top:0; left:0; }
    .background-layer svg { width:100%; height:100%; }
    .stimulus {
      position:absolute; z-index:10; width:120px; height:120px;
      bottom:50px; left:50%; transform:translateX(-50%);
      display:flex; justify-content:center; align-items:center; opacity:0;
    }
    .stimulus svg { width:100%; height:100%; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
    .record-bar { position:absolute; top:52px; left:50%; transform:translateX(-50%); z-index:12; display:flex; gap:6px; }
    .record-slot {
      width:40px; height:40px; border-radius:6px;
      border:1px dashed rgba(255,255,255,0.25);
      display:flex; align-items:center; justify-content:center;
      position:relative; perspective:600px;
    }
    .slot-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.6s ease-in-out; }
    .record-slot.flipped .slot-inner { transform:rotateY(180deg); }
    .slot-front, .slot-back { position:absolute; width:100%; height:100%; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; border-radius:6px; }
    .slot-front svg { width:90%; height:90%; opacity:0; transition:opacity 0.3s; }
    .slot-front svg.show { opacity:0.75; }
    .slot-back { transform:rotateY(180deg); background:rgba(52,152,219,0.4); border:2px solid var(--primary-color); font-size:1.3em; font-weight:bold; color:var(--primary-color); }
    .guide-ring { position:absolute; top:-4px; left:-4px; right:-4px; bottom:-4px; border-radius:10px; opacity:0; transition:opacity 0.25s; z-index:5; }
    .guide-ring.on { opacity:1; }
    .guide-ring.forward { border:4px solid var(--forward-color); box-shadow:0 0 20px rgba(46,204,113,0.9), inset 0 0 10px rgba(46,204,113,0.4); }
    .guide-ring.reverse { border:4px solid var(--reverse-color); box-shadow:0 0 20px rgba(230,126,34,0.9), inset 0 0 10px rgba(230,126,34,0.4); }
    @keyframes wiggle { 0%,100%{transform:rotate(0)} 15%{transform:rotate(-12deg)} 30%{transform:rotate(14deg)} 45%{transform:rotate(-12deg)} 60%{transform:rotate(10deg)} 75%{transform:rotate(-8deg)} 90%{transform:rotate(6deg)} }
    .record-slot.wiggle { animation:wiggle 0.6s ease-in-out; }
    .controls-area { width:100%; display:flex; justify-content:center; padding:10px 0 15px; transition:opacity 0.3s; }
    .btn-key { width:200px; height:120px; border:none; border-radius:15px; font-size:2.5em; color:white; cursor:default; display:flex; flex-direction:column; justify-content:center; align-items:center; box-shadow:0 4px 0 rgba(0,0,0,0.2); background:linear-gradient(135deg,#3498db 0%,#2980b9 100%); transition:transform 0.1s, box-shadow 0.1s; }
    .btn-key.pressed { transform:translateY(4px); box-shadow:none; }
    .btn-key.glow { box-shadow:0 0 20px rgba(52,152,219,0.8), 0 0 40px rgba(46,204,113,0.4); }
    .key-hint { font-size:1rem; opacity:0.8; margin-bottom:5px; font-weight:bold; }
    .btn-label { font-size:1.5rem; font-weight:bold; }
    .checkmark { position:absolute; z-index:20; font-size:60px; bottom:175px; left:50%; transform:translateX(-50%) scale(0); opacity:0; }
    @keyframes popIn { 0%{transform:translateX(-50%) scale(0);opacity:0} 50%{transform:translateX(-50%) scale(1.3);opacity:1} 100%{transform:translateX(-50%) scale(1);opacity:1} }
    @keyframes fadeOut { 0%{opacity:1} 100%{opacity:0} }
    .checkmark.show { animation:popIn 0.3s ease-out forwards; }
    .checkmark.hide { animation:fadeOut 0.2s ease-out forwards; }
    @keyframes shakeHand { 0%{transform:rotate(0)} 12.5%{transform:rotate(-45deg)} 25%{transform:rotate(45deg)} 37.5%{transform:rotate(-45deg)} 50%{transform:rotate(45deg)} 62.5%{transform:rotate(-45deg)} 75%{transform:rotate(45deg)} 87.5%{transform:rotate(-45deg)} 100%{transform:rotate(0)} }
    .wm-scene { width:100%; display:none; flex-direction:column; align-items:center; padding:15px; opacity:0; transition:opacity 0.5s; }
    .wm-scene.active { display:flex; }
    .wm-container { width:92%; border-radius:15px; padding:18px 12px; display:flex; flex-direction:column; align-items:center; gap:10px; border:3px solid var(--forward-color); }
    .wm-title { font-size:1.2em; font-weight:bold; }
    .wm-question { text-align:center; line-height:1.5; font-size:0.9em; }
    .wm-question strong { color:var(--accent-yellow); }
    .wm-hint { font-size:0.75em; color:rgba(255,255,255,0.5); }
    .wm-answer-bar { display:flex; gap:4px; flex-wrap:nowrap; justify-content:center; }
    .wm-answer-slot { width:45px; height:65px; border:3px solid var(--primary-color); border-radius:10px; background:rgba(255,255,255,0.08); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
    .wm-answer-slot .slot-num { font-size:0.65em; color:var(--accent-yellow); font-weight:bold; }
    .wm-answer-slot .slot-icon { font-size:1.6em; color:var(--error-color); font-weight:bold; }
    .wm-answer-slot svg { width:32px; height:32px; }
    .wm-btn { padding:8px 20px; border:none; border-radius:10px; color:white; font-size:0.85em; cursor:default; font-weight:bold; }
    .wm-btn-reset { background:#7f8c8d; }
    .wm-btn-confirm { background:linear-gradient(135deg,#3498db,#2980b9); width:75%; padding:10px; }
    .wm-btn-confirm.pressed { transform:translateY(3px); }
    .wm-btn-confirm.glow { box-shadow:0 0 15px rgba(46,204,113,0.6); }
    .wm-result { display:none; background:rgba(0,0,0,0.5); border-radius:12px; padding:12px 18px; text-align:center; line-height:1.7; width:90%; margin-top:8px; }
    .wm-result.show { display:block; }
    .wm-result h3 { color:var(--success-color); font-size:1.3em; margin-bottom:3px; }
    .wm-result .detail { font-size:0.8em; color:rgba(255,255,255,0.7); }
    .wm-btn-continue { background:#9b59b6; width:65%; padding:10px; display:none; margin-top:8px; border:none; border-radius:10px; color:white; font-weight:bold; font-size:0.9em; }
    .hand-layer { position:absolute; top:0; left:0; width:100%; height:100%; z-index:50; pointer-events:none; overflow:visible; }
    .hand { position:absolute; width:80px; height:100px; opacity:0; will-change:transform,opacity,top,left; }
    .hand-finger { left:440px; top:420px; }
    .hand-stop { left:-100px; top:400px; }
    .hand svg { width:100%; height:100%; filter:drop-shadow(2px 4px 6px rgba(0,0,0,0.3)); }
    .progress-bar { width:90%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:5px auto 10px; overflow:hidden; }
    .progress-fill { height:100%; width:0%; border-radius:2px; transition:width linear; }
    .progress-fill { background:linear-gradient(90deg, var(--primary-color), var(--success-color)); }
    .phase-label { font-size:0.7rem; color:rgba(255,255,255,0.35); margin-bottom:5px; min-height:1em; }
  </style>
</head>
<body>
  <div class="demo-container" id="demoContainer">
    <div class="game-scene" id="gameScene">
      <div class="stimulus-container">
        <div class="background-layer" id="bgLayer"></div>
        <div class="record-bar">
          <div class="record-slot" id="rs0"><div class="guide-ring" id="gr0"></div><div class="slot-inner"><div class="slot-front" id="sf0"></div><div class="slot-back">❓</div></div></div>
          <div class="record-slot" id="rs1"><div class="guide-ring" id="gr1"></div><div class="slot-inner"><div class="slot-front" id="sf1"></div><div class="slot-back">❓</div></div></div>
          <div class="record-slot" id="rs2"><div class="guide-ring" id="gr2"></div><div class="slot-inner"><div class="slot-front" id="sf2"></div><div class="slot-back">❓</div></div></div>
          <div class="record-slot" id="rs3"><div class="guide-ring" id="gr3"></div><div class="slot-inner"><div class="slot-front" id="sf3"></div><div class="slot-back">❓</div></div></div>
          <div class="record-slot" id="rs4"><div class="guide-ring" id="gr4"></div><div class="slot-inner"><div class="slot-front" id="sf4"></div><div class="slot-back">❓</div></div></div>
          <div class="record-slot" id="rs5"><div class="guide-ring" id="gr5"></div><div class="slot-inner"><div class="slot-front" id="sf5"></div><div class="slot-back">❓</div></div></div>
        </div>
        <div class="stimulus" id="stimulus"></div>
        <div class="checkmark" id="checkmark">✅</div>
      </div>
      <div class="controls-area" id="controlsArea">
        <div class="btn-key" id="actionBtn"><span class="key-hint">按空白鍵(或點此)</span><span class="btn-label">蒐集</span></div>
      </div>
    </div>
    <div class="wm-scene" id="wmScene">
      <div class="wm-container" id="wmContainer">
        <div class="wm-title" id="wmTitle">🧠 記憶力測試</div>
        <div class="wm-question" id="wmQuestion"></div>
        <div class="wm-hint" id="wmHint"></div>
        <div class="wm-answer-bar" id="wmAnswerBar"></div>
        <div style="display:flex;gap:8px;justify-content:center"><button class="wm-btn wm-btn-reset">🔄 重新選擇</button></div>
        <button class="wm-btn wm-btn-confirm" id="wmConfirmBtn">✓ 確認答案</button>
      </div>
      <div class="wm-result" id="wmResult"></div>
      <button class="wm-btn-continue" id="wmContinueBtn">➡ 繼續</button>
    </div>
    <div class="phase-label" id="phaseLabel"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="hand-layer">
      <div class="hand hand-finger" id="handFinger"></div>
      <div class="hand hand-stop" id="handStop"></div>
    </div>
  </div>

      const dirColor = isReverse ? 'var(--reverse-color)' : 'var(--forward-color)';
      const dirLabel = isReverse ? '逆序' : '順序';
      const dirResult = isReverse ? '逆向 👈' : '順向 👉';
      const dirTime = isReverse ? '5.1' : '4.2';
      const ops = isReverse ? REV_OPS : FWD_OPS;
      const SEQ = isReverse ? SEQ_REV : SEQ_FWD;
      currentCycle = isReverse ? CYCLE_REV : CYCLE_FWD;
      const goType = isReverse ? 'cat' : 'cheese';
      const btnText = isReverse ? '蒐集' : '蒐集';
      DOM.btn.querySelector('.btn-label').textContent = btnText;

      // ── 前段 ──
      SEQ.forEach((type, i) => {
        const t = 1000 + i * GAP;
        const isGo = (type === goType);
        sc(() => { DOM.stim.innerHTML = SVGS[type]; DOM.stim.style.opacity = '1'; fillSlot(i, type); }, t);
        if (isGo) {
          sc(() => { rstH(); DOM.hand.innerHTML = SVG_SPACE_UP; requestAnimationFrame(() => { DOM.hand.style.opacity = '1'; moveTo(DOM.hand, bp.l, bp.t, 800); }); }, t + 400);
          sc(() => { DOM.hand.innerHTML = SVG_SPACE_DOWN; DOM.hand.style.transition = 'top 150ms ease-in'; DOM.hand.style.top = (bp.t + 20) + 'px'; pB(); }, t + 1500);
          sc(() => { DOM.hand.innerHTML = SVG_SPACE_UP; DOM.hand.style.transition = 'top 150ms ease-out'; DOM.hand.style.top = bp.t + 'px'; rB(); }, t + 1900);
          sc(() => { DOM.hand.style.transition = 'left 0.4s ease-in, opacity 0.3s'; DOM.hand.style.left = '440px'; DOM.hand.style.opacity = '0'; }, t + 2100);
          sc(() => showC(), t + 2300);
          sc(() => hideC(), t + 3300);
          sc(() => { rstC(); rstH(); DOM.stim.style.transition = 'opacity 0.3s'; DOM.stim.style.opacity = '0'; }, t + 3500);
        } else {
          sc(() => { rstH(); DOM.hand.innerHTML = SVG_SPACE_UP; requestAnimationFrame(() => { DOM.hand.style.opacity = '1'; moveTo(DOM.hand, bp.l + 80, bp.t, 500, 'cubic-bezier(0.6,0,0.4,1)'); }); }, t + 400);
          sc(() => { rstS(); DOM.handStop.innerHTML = SVG_HAND_STOP; requestAnimationFrame(() => { DOM.handStop.style.opacity = '1'; moveTo(DOM.handStop, bp.l - 10, bp.t - 20, 300, 'cubic-bezier(0.2,0,0,1)'); DOM.handStop.style.animation = 'shakeHand 0.8s ease-in-out 1'; }); DOM.hand.style.transition = 'left 0.4s cubic-bezier(0,0,0.6,1), opacity 0.3s'; DOM.hand.style.left = '440px'; DOM.hand.style.opacity = '0'; }, t + 850);
          sc(() => { DOM.handStop.style.animation = 'none'; DOM.handStop.style.transition = 'left 0.4s ease-in, opacity 0.3s'; DOM.handStop.style.left = '-100px'; DOM.handStop.style.opacity = '0'; }, t + 1500);
          sc(() => { rstS(); rstH(); }, t + 1900);
          sc(() => showC(), t + 2000);
          sc(() => hideC(), t + 3000);
          sc(() => { rstC(); DOM.stim.style.transition = 'opacity 0.3s'; DOM.stim.style.opacity = '0'; }, t + 3200);
        }
        sc(() => { DOM.stim.style.transition = 'none'; DOM.stim.innerHTML = ''; }, t + 3800);
      });

      // ── 中段 ──
      sc(() => { DOM.controls.style.transition = 'opacity 0.3s'; DOM.controls.style.opacity = '0'; }, 25000);
      for (let step = 0; step < 6; step++) {
        const idx = isReverse ? (5 - step) : step;
        sc(() => { DOM.rings[idx].classList.add('on', colorCls); DOM.slots[idx].classList.add('wiggle'); setTimeout(() => DOM.slots[idx].classList.remove('wiggle'), 600); }, 25500 + step * 600);
      }
      sc(() => { DOM.slots.forEach(s => { s.style.transition = 'transform 0.3s'; s.style.transform = 'scale(1.2)'; }); setTimeout(() => DOM.slots.forEach(s => s.style.transform = 'scale(1)'), 350); }, 25500 + 6 * 600 + 300);
      sc(() => { DOM.slots.forEach(s => s.classList.add('flipped')); DOM.rings.forEach(r => r.classList.remove('on', 'forward', 'reverse')); }, 25500 + 6 * 600 + 900);

      // ── 後段 ──
      sc(() => { DOM.gameScene.style.transition = 'opacity 0.5s'; DOM.gameScene.style.opacity = '0'; }, 30500);
      sc(() => {
        DOM.gameScene.style.display = 'none';
        DOM.wmScene.classList.add('active'); DOM.wmScene.style.display = 'flex';
        DOM.wmContainer.style.borderColor = dirColor;
        DOM.wmTitle.style.color = dirColor;
        DOM.wmQuestion.innerHTML = `<strong>請回想：</strong><br>按照<span style="color:${dirColor};font-weight:bold">${dirLabel}</span>，<br>剛才<strong>最後 6 個物件</strong>的順序為何？`;
        DOM.wmResult.innerHTML = `<h3>✓ 答對了！</h3><p>你的記憶力真棒！</p><div class="detail">方向：${dirResult}<br>答對：6 / 6<br>完成時間：${dirTime} 秒<br>WM 得分：3（基礎 2 + 全對 1 + 速度 0）<br><span style="color:var(--success-color)">✅ 通過！</span></div>`;
        buildWm();
        DOM.wmHint.textContent = isReverse ? '點擊按鈕切換答案（❓ → 🐈‍⬛ → 🧀 → ❓）' : '點擊按鈕切換答案（❓ → 🧀 → 🐈‍⬛ → ❓）';
        requestAnimationFrame(() => DOM.wmScene.style.opacity = '1');
      }, 31600);

      let t = 32500;
      ops.forEach(o => {
        sc(() => { rstH(); DOM.hand.innerHTML = SVG_FT_IDLE; requestAnimationFrame(() => { DOM.hand.style.opacity = '1'; const p = waPos(o.s); moveTo(DOM.hand, p.l, p.t, 500); }); }, t);
        t += 700;
        for (let k = 0; k < o.n; k++) { const ct = t; sc(() => { DOM.hand.innerHTML = SVG_FT_CLICK; cycleWa(o.s); }, ct); sc(() => { DOM.hand.innerHTML = SVG_FT_IDLE; }, ct + 200); t += 600; }
        t += 150;
      });
      const cf = t + 200;
      sc(() => { rstH(); DOM.hand.innerHTML = SVG_FT_IDLE; requestAnimationFrame(() => { DOM.hand.style.opacity = '1'; const p = cfPos(); moveTo(DOM.hand, p.l, p.t, 500); }); }, cf);
      sc(() => { DOM.hand.innerHTML = SVG_FT_CLICK; DOM.wmConfirm.classList.add('pressed', 'glow'); }, cf + 700);
      sc(() => { DOM.hand.innerHTML = SVG_FT_IDLE; DOM.wmConfirm.classList.remove('pressed', 'glow'); DOM.hand.style.transition = 'left 0.3s, opacity 0.3s'; DOM.hand.style.left = '440px'; DOM.hand.style.opacity = '0'; }, cf + 1000);
      sc(() => { DOM.wmResult.classList.add('show'); DOM.wmCont.style.display = 'block'; }, cf + 1400);
      sc(() => { DOM.wmScene.style.transition = 'opacity 0.5s'; DOM.wmScene.style.opacity = '0'; }, cf + 3800);
      sc(() => onDone(), cf + 4500);
    }

    function startCycle() {
      clr(); resetScene(); resetTimebar();
      DOM.bgLayer.innerHTML = SVG_BG;
      DOM.phaseLabel.textContent = '── 工作記憶示範（順向）──';
      startTimebar(84000);

      playRound(false, () => {
        // 順向結束 → 開始逆向
        resetScene();
        DOM.bgLayer.innerHTML = SVG_BG;
        DOM.phaseLabel.textContent = '── 工作記憶示範（逆向）──';

        playRound(true, () => {
          // 逆向結束 → 循環
          startCycle();
        });
      });
    }

    function init() {
      DOM.bgLayer.innerHTML = SVG_BG;
      DOM.hand.innerHTML = SVG_SPACE_UP;
      DOM.handStop.innerHTML = SVG_HAND_STOP;
      startCycle();
    }
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
