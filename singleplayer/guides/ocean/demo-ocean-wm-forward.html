<!--
  ============================================================
  📄 demo-mouse-wm-slow.html
  📝 工作記憶規則說明動畫 v1.3.1（老鼠場・順向版）
  🎯 4-6 歲學前幼兒（含聽損兒）
  📐 對應：index-0204v14.html（各回合結束後的工作記憶測試）
  🏫 中原大學特殊教育學系
  
  【三段式結構】
  ═══ 前段（0~19s）：Go/NoGo + 順序記錄 ═══
    - 示範序列：🧀😺🧀😺🧀🧀（共 6 個）
    - 每個刺激物約 3 秒處理時間
    - 記錄區在老鼠洞內部上緣，同步累積小圖示
  
  ═══ 中段（19~24s）：順序引導 ═══
    - 綠色光圈從左到右逐一亮起（累積不滅）
    - 每格小圖輕微晃動
    - 全亮後脈動 → 翻轉成藍色❓
  
  ═══ 後段（24.5~41.5s）：操作示範 ═══
    - 切換到答題介面
    - 手指示範循環點擊填答
    - 點擊確認按鈕 → 顯示「答對了」
  
  【總循環時長】：約 41.5 秒
  ============================================================
-->
<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>示範動畫 - 工作記憶測試（老鼠場・順向）</title>
    <style>
      /* ============================================================
         🎨 CSS 變數定義
         教學註記：集中管理顏色、尺寸等，方便全域調整
      ============================================================ */
      :root {
        --bg-color: #2c3e50;
        --game-bg: #34495e;
        --text-color: #ecf0f1;
        --primary-color: #3498db;
        --primary-dark: #2980b9;
        --success-color: #2ecc71;
        --danger-color: #e74c3c;
        --warning-color: #e67e22;
        --yellow-color: #f1c40f;
        
        /* 記錄區專用（洞內）*/
        --slot-size: 60px;
        --slot-gap: 8px;
        --slot-radius: 8px;
        
        /* 答題區專用 */
        --answer-size: 40px;
        --answer-gap: 6px;
      }
      
      /* ============================================================
         🔧 基礎重置
      ============================================================ */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "微軟正黑體", "Microsoft JhengHei", "PingFang TC", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      /* ============================================================
         📦 主容器
      ============================================================ */
      .demo-container {
        background-color: var(--game-bg);
        border-radius: 15px;
        width: 100%;
        max-width: 420px;
        min-height: 650px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ============================================================
         🎮 刺激物容器（300×400，老鼠洞背景）
      ============================================================ */
      .game-area {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: opacity 0.5s;
        padding-top: 10px;
      }
      .stimulus-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 0 auto;
      }
      .background-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
        top: 0;
        left: 0;
      }
      .background-layer svg {
        width: 100%;
        height: 100%;
      }
      
      /* ============================================================
         📊 記錄區（在老鼠洞內部上緣）
         教學註記：6 格 60×60px，顯示刺激物出現順序的縮圖
      ============================================================ */
      .record-area {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        gap: var(--slot-gap);
        z-index: 5;
      }
      .record-slot {
        width: var(--slot-size);
        height: var(--slot-size);
        border-radius: var(--slot-radius);
        border: 2px dashed rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        transition: border-color 0.3s, box-shadow 0.3s;
        /* 翻轉用 */
        transform-style: preserve-3d;
        perspective: 200px;
      }
      .record-slot .slot-icon {
        width: 50px;
        height: 50px;
        opacity: 0;
        transition: opacity 0.3s;
        position: absolute;
        backface-visibility: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .record-slot .slot-icon svg {
        width: 100%;
        height: 100%;
      }
      .record-slot .slot-icon.show {
        opacity: 0.8;
      }
      /* 綠色光圈（順向引導） */
      .record-slot.glow-green {
        border-color: var(--success-color);
        border-style: solid;
        box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
      }
      /* 晃動動畫 */
      @keyframes wiggle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-5deg); }
        75% { transform: rotate(5deg); }
      }
      .record-slot.wiggle .slot-icon {
        animation: wiggle 0.3s ease-in-out;
      }
      /* 脈動動畫 */
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.12); }
      }
      .record-slot.pulse {
        animation: pulse 0.5s ease-in-out;
      }
      /* 翻轉後的❓背面 */
      .record-slot .slot-question {
        width: 100%;
        height: 100%;
        background: var(--primary-color);
        border-radius: var(--slot-radius);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
        position: absolute;
        backface-visibility: hidden;
        transform: rotateY(180deg);
        opacity: 0;
      }
      .record-slot.flipped {
        animation: flipCard 0.4s ease-in-out forwards;
      }
      @keyframes flipCard {
        0% { transform: rotateY(0deg); }
        50% { transform: rotateY(90deg); }
        100% { transform: rotateY(180deg); }
      }
      .record-slot.flipped .slot-icon {
        opacity: 0 !important;
      }
      .record-slot.flipped .slot-question {
        opacity: 1;
      }

      /* ============================================================
         🎯 刺激物（主要顯示區）
      ============================================================ */
      .stimulus {
        position: absolute;
        z-index: 10;
        width: 120px;
        height: 120px;
        bottom: 70px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .stimulus svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3));
      }

      /* ============================================================
         🔘 按鈕（與遊戲一致）
      ============================================================ */
      .controls-area {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 10px 0 15px;
      }
      .btn-key {
        width: 200px;
        height: 120px;
        border: none;
        border-radius: 15px;
        font-size: 2.5em;
        color: white;
        cursor: default;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
        background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        transition: transform 0.1s, box-shadow 0.1s, opacity 0.3s;
        position: relative;
      }
      .btn-key.pressed {
        transform: translateY(4px);
        box-shadow: none;
      }
      .btn-key.glow {
        box-shadow: 0 0 20px rgba(52, 152, 219, 0.8), 0 0 40px rgba(46, 204, 113, 0.4);
      }
      .key-hint {
        font-size: 1rem;
        opacity: 0.8;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .btn-label {
        font-size: 1.5rem;
        font-weight: bold;
      }

      /* ============================================================
         ✋ 手圖層
      ============================================================ */
      .hand-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        pointer-events: none;
        overflow: visible;
      }
      .hand {
        position: absolute;
        width: 80px;
        height: 100px;
        opacity: 0;
        will-change: transform, opacity, top, left;
      }
      .hand-finger {
        left: 440px;
        top: 420px;
      }
      .hand-stop {
        left: -100px;
        top: 400px;
      }
      .hand svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.3));
      }

      /* ✅ 勾勾 */
      .checkmark {
        position: absolute;
        z-index: 20;
        font-size: 50px;
        bottom: 200px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        opacity: 0;
        will-change: transform, opacity;
      }
      @keyframes popIn {
        0% { transform: translateX(-50%) scale(0); opacity: 0; }
        50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
        100% { transform: translateX(-50%) scale(1); opacity: 1; }
      }
      @keyframes fadeOut {
        0% { opacity: 1; }
        100% { opacity: 0; }
      }
      .checkmark.show { animation: popIn 0.3s ease-out forwards; }
      .checkmark.hide { animation: fadeOut 0.2s ease-out forwards; }

      /* 搖手（±45°） */
      @keyframes shakeHand {
        0% { transform: rotate(0deg); }
        12.5% { transform: rotate(-45deg); }
        25% { transform: rotate(45deg); }
        37.5% { transform: rotate(-45deg); }
        50% { transform: rotate(45deg); }
        62.5% { transform: rotate(-45deg); }
        75% { transform: rotate(45deg); }
        87.5% { transform: rotate(-45deg); }
        100% { transform: rotate(0deg); }
      }

      /* ============================================================
         📝 答題介面（後段）
      ============================================================ */
      .answer-area {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--game-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
        z-index: 30;
      }
      .answer-area.show {
        opacity: 1;
        pointer-events: auto;
      }
      
      /* 紅框容器 */
      .answer-container {
        border: 2px solid rgba(231, 76, 60, 0.5);
        border-radius: 15px;
        padding: 20px 15px;
        width: 100%;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      
      .answer-title {
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .answer-main-instruction {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 12px;
      }
      .answer-direction {
        font-size: 1.1rem;
        text-align: center;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .answer-direction .green { color: var(--success-color); font-weight: bold; }
      .answer-direction .yellow { color: var(--yellow-color); font-weight: bold; }
      
      .answer-hint {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 20px;
      }
      
      /* 答題方塊網格（6 格一排）*/
      .answer-grid {
        display: flex;
        justify-content: center;
        gap: var(--answer-gap);
        margin-bottom: 25px;
      }
      .answer-box {
        width: var(--answer-size);
        height: var(--answer-size);
        background: rgba(0, 0, 0, 0.25);
        border-radius: 8px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        transition: transform 0.1s, border-color 0.2s;
      }
      .answer-box .box-number {
        position: absolute;
        top: 2px;
        left: 5px;
        font-size: 0.65rem;
        color: var(--warning-color);
        font-weight: bold;
      }
      .answer-box .box-content {
        font-size: 1.3rem;
        transition: transform 0.15s;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .answer-box .box-content.question {
        color: var(--danger-color);
        font-weight: bold;
      }
      .answer-box .box-content svg {
        width: 28px;
        height: 28px;
      }
      .answer-box.selected {
        border-color: var(--primary-color);
      }
      .answer-box.pressed {
        transform: scale(0.95);
      }
      
      /* 底部按鈕 */
      .answer-buttons {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }
      .answer-btn {
        padding: 12px 25px;
        border: none;
        border-radius: 20px;
        font-size: 1rem;
        font-weight: bold;
        cursor: default;
        transition: transform 0.1s, box-shadow 0.15s;
      }
      .answer-btn.reset {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .answer-btn.confirm {
        width: 90%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        color: white;
        border-radius: 12px;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.2);
      }
      .answer-btn.pressed {
        transform: translateY(3px);
        box-shadow: none;
      }

      /* 結果反饋（直接顯示，無動畫）*/
      .result-feedback {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--game-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        z-index: 35;
        transition: opacity 0.3s;
      }
      .result-feedback.show {
        opacity: 1;
        pointer-events: auto;
      }
      .result-title {
        font-size: 1.6rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .result-subtitle {
        font-size: 1.2rem;
        margin-bottom: 20px;
      }
      .result-details {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 12px;
        padding: 15px 25px;
        line-height: 1.8;
        text-align: left;
      }
      .result-details .pass {
        color: var(--success-color);
        font-weight: bold;
      }

      /* ============================================================
         📊 進度條
      ============================================================ */
      .progress-bar {
        width: 90%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        margin: 8px auto 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        transition: width 0.3s linear;
      }
      .progress-fill.phase1 { background: var(--success-color); }
      .progress-fill.phase2 { background: var(--primary-color); }
      .progress-fill.phase3 { background: var(--warning-color); }
      
      .phase-label {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 8px;
        min-height: 1.2em;
        text-align: center;
      }

      /* ============================================================
         🎛️ 控制覆蓋
      ============================================================ */
      .guide-done-overlay {
        position: absolute;
        inset: 0;
        z-index: 100;
        background: rgba(44, 62, 80, 0.95);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        border-radius: 15px;
      }
      .guide-done-overlay.show { display: flex; }
      .guide-done-title {
        font-size: 1.3rem;
        font-weight: 700;
      }
      .guide-btn {
        padding: 12px 28px;
        border: none;
        border-radius: 12px;
        font-size: 1.05rem;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .guide-btn:active { transform: scale(0.96); }
      .guide-btn-ready {
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        box-shadow: 0 4px 12px rgba(46, 204, 113, 0.4);
      }
      .guide-btn-replay {
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .guide-btn-skip {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 110;
        background: rgba(255, 255, 255, 0.25);
        border: 2px solid rgba(255, 255, 255, 0.5);
        padding: 10px 22px;
        font-size: 1rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="demo-container" id="demoContainer">
      
      <!-- 跳過按鈕 -->
      <button class="guide-btn guide-btn-skip" id="btnGuideSkip">跳過 ▶</button>
      
      <!-- ═══ 遊戲區（前段 + 中段）═══ -->
      <div class="game-area" id="gameArea">
        <div class="stimulus-container" id="stimulusContainer">
          <div class="background-layer" id="bgLayer"></div>
          
          <!-- 記錄區（在老鼠洞內部）-->
          <div class="record-area" id="recordArea">
            <div class="record-slot" id="slot1">
              <div class="slot-icon" id="slotIcon1"></div>
              <div class="slot-question">❓</div>
            </div>
            <div class="record-slot" id="slot2">
              <div class="slot-icon" id="slotIcon2"></div>
              <div class="slot-question">❓</div>
            </div>
            <div class="record-slot" id="slot3">
              <div class="slot-icon" id="slotIcon3"></div>
              <div class="slot-question">❓</div>
            </div>
            <div class="record-slot" id="slot4">
              <div class="slot-icon" id="slotIcon4"></div>
              <div class="slot-question">❓</div>
            </div>
            <div class="record-slot" id="slot5">
              <div class="slot-icon" id="slotIcon5"></div>
              <div class="slot-question">❓</div>
            </div>
            <div class="record-slot" id="slot6">
              <div class="slot-icon" id="slotIcon6"></div>
              <div class="slot-question">❓</div>
            </div>
          </div>
          
          <div class="stimulus" id="stimulus"></div>
          <div class="checkmark" id="checkmark">✅</div>
        </div>
        <div class="controls-area">
          <button class="btn-key" id="actionBtn">
            <span class="key-hint">🔑 空白鍵</span>
            <span class="btn-label">蒐集起司</span>
          </button>
        </div>
      </div>
      
      <!-- ═══ 答題區（後段）═══ -->
      <div class="answer-area" id="answerArea">
        <div class="answer-container">
          <div class="answer-title">🧠 記憶力測試</div>
          <div class="answer-main-instruction">請回想：</div>
          <div class="answer-direction">
            按照「<span class="green">順序</span>」，<br>
            剛才「<span class="yellow">最後 6 個物件</span>」的順序為何？
          </div>
          <div class="answer-hint">點擊按鈕切換圖示（❓ → 🧀 → 🐈‍⬛ → ❓）</div>
          
          <div class="answer-grid" id="answerGrid">
            <div class="answer-box" id="ansBox1">
              <span class="box-number">1</span>
              <span class="box-content question" id="ansContent1">❓</span>
            </div>
            <div class="answer-box" id="ansBox2">
              <span class="box-number">2</span>
              <span class="box-content question" id="ansContent2">❓</span>
            </div>
            <div class="answer-box" id="ansBox3">
              <span class="box-number">3</span>
              <span class="box-content question" id="ansContent3">❓</span>
            </div>
            <div class="answer-box" id="ansBox4">
              <span class="box-number">4</span>
              <span class="box-content question" id="ansContent4">❓</span>
            </div>
            <div class="answer-box" id="ansBox5">
              <span class="box-number">5</span>
              <span class="box-content question" id="ansContent5">❓</span>
            </div>
            <div class="answer-box" id="ansBox6">
              <span class="box-number">6</span>
              <span class="box-content question" id="ansContent6">❓</span>
            </div>
          </div>
          
          <div class="answer-buttons">
            <button class="answer-btn reset" id="btnReset">🔄 重新選擇</button>
            <button class="answer-btn confirm" id="btnConfirm">✓ 確認答案</button>
          </div>
        </div>
        
        <!-- 結果反饋 -->
        <div class="result-feedback" id="resultFeedback">
          <div class="result-title">🎉 答對了！</div>
          <div class="result-subtitle">你的記憶力真棒！</div>
          <div class="result-details">
            方向：順向 👉<br>
            答對：6/6<br>
            完成時間：8.5 秒<br>
            WM 得分：5<br>
            <span class="pass">✅ 通過！</span>
          </div>
        </div>
      </div>
      
      <!-- ═══ 手圖層 ═══ -->
      <div class="hand-layer" id="handLayer">
        <div class="hand hand-finger" id="handFinger"></div>

      ============================================================ */
      
      // 取得按鈕中心座標（相對於容器）
      function getBtnCenter() {
        const cRect = DOM.container.getBoundingClientRect();
        const bRect = DOM.btn.getBoundingClientRect();
        return {
          left: bRect.left - cRect.left + bRect.width / 2 - 40,
          top: bRect.top - cRect.top + bRect.height / 2 - 50,
        };
      }
      
      // 取得答題方塊中心座標
      function getAnswerBoxCenter(index) {
        const cRect = DOM.container.getBoundingClientRect();
        const bRect = DOM.ansBoxes[index].getBoundingClientRect();
        return {
          left: bRect.left - cRect.left + bRect.width / 2 - 40,
          top: bRect.top - cRect.top + bRect.height / 2 - 50,
        };
      }
      
      // 取得確認按鈕中心座標
      function getConfirmBtnCenter() {
        const cRect = DOM.container.getBoundingClientRect();
        const bRect = DOM.btnConfirm.getBoundingClientRect();
        return {
          left: bRect.left - cRect.left + bRect.width / 2 - 40,
          top: bRect.top - cRect.top + bRect.height / 2 - 50,
        };
      }

      // 手移動動畫
      function moveHandTo(hand, left, top, dur, ease = "cubic-bezier(0.4,0,0.2,1)") {
        hand.style.transition = `left ${dur}ms ${ease}, top ${dur}ms ${ease}, opacity 0.15s`;
        hand.style.left = left + "px";
        hand.style.top = top + "px";
      }
      
      // 重置手指
      function resetFinger() {
        DOM.handFinger.style.transition = "none";
        DOM.handFinger.style.opacity = "0";
        DOM.handFinger.style.left = "440px";
        DOM.handFinger.style.top = "420px";
      }
      
      // 重置停止手
      function resetStop() {
        DOM.handStop.style.transition = "none";
        DOM.handStop.style.opacity = "0";
        DOM.handStop.style.left = "-100px";
        DOM.handStop.style.top = "400px";
        DOM.handStop.style.animation = "none";
        DOM.handStop.style.transformOrigin = "center bottom";
      }
      
      // 勾勾動畫
      function showCheck() { DOM.checkmark.className = "checkmark show"; }
      function hideCheck() { DOM.checkmark.className = "checkmark hide"; }
      function resetCheck() {
        DOM.checkmark.className = "checkmark";
        DOM.checkmark.style.opacity = "0";
        DOM.checkmark.style.transform = "translateX(-50%) scale(0)";
      }
      
      // 按鈕狀態
      function pressBtn() { DOM.btn.classList.add("pressed", "glow"); }
      function releaseBtn() { DOM.btn.classList.remove("pressed", "glow"); }
      
      // 進度條更新
      function updateProgress(pct, phase) {
        DOM.progressFill.className = `progress-fill ${phase}`;
        DOM.progressFill.style.width = pct + "%";
      }

      // 記錄區重置
      function resetRecordArea() {
        DOM.slots.forEach(slot => {
          slot.classList.remove("glow-green", "wiggle", "pulse", "flipped");
        });
        DOM.slotIcons.forEach(icon => {
          icon.innerHTML = "";
          icon.classList.remove("show");
        });
      }

      // 答題區重置
      function resetAnswerArea() {
        answerStates = [0, 0, 0, 0, 0, 0];
        DOM.ansContents.forEach(content => {
          content.innerHTML = "❓";
          content.className = "box-content question";
        });
        DOM.ansBoxes.forEach(box => box.classList.remove("selected", "pressed"));
        DOM.btnConfirm.classList.remove("pressed");
        DOM.btnReset.classList.remove("pressed");
        DOM.resultFeedback.classList.remove("show");
      }

      // 全部重置
      function resetAll() {
        DOM.stimulus.style.opacity = "0";
        DOM.stimulus.innerHTML = "";
        resetFinger();
        resetStop();
        resetCheck();
        releaseBtn();
        resetRecordArea();
        resetAnswerArea();
        updateProgress(0, "phase1");
        DOM.phaseLabel.textContent = "";
        DOM.gameArea.style.opacity = "1";
        DOM.btn.style.opacity = "1";
        DOM.answerArea.classList.remove("show");
      }

      /* ============================================================
         🎬 前段：Go/NoGo + 順序記錄（0s ~ 19s）
      ============================================================ */
      function playPhase1() {
        DOM.phaseLabel.textContent = "── 前段：記住出現順序 ──";
        updateProgress(0, "phase1");
        const bp = getBtnCenter();

        // 遍歷 6 個刺激物
        SEQUENCE.forEach((type, idx) => {
          const startTime = 1000 + idx * 3000;
          const isGo = type === "cheese";
          
          // 1. 刺激物出現 + 記錄區小圖淡入
          schedule(() => {
            DOM.stimulus.innerHTML = isGo ? SVG_CHEESE : SVG_CAT;
            DOM.stimulus.style.opacity = "1";
            DOM.slotIcons[idx].innerHTML = isGo ? SVG_CHEESE : SVG_CAT;
            DOM.slotIcons[idx].classList.add("show");
          }, startTime);

          if (isGo) {
            // ═══ Go 流程 ═══
            schedule(() => {
              resetFinger();
              DOM.handFinger.innerHTML = SVG_FINGER_TAP;
              requestAnimationFrame(() => {
                DOM.handFinger.style.opacity = "1";
                moveHandTo(DOM.handFinger, bp.left, bp.top, 800);
              });
            }, startTime + 400);
            
            schedule(() => {
              DOM.handFinger.innerHTML = SVG_HAND2_CLICK;
              DOM.handFinger.style.transition = "top 150ms ease-in";
              DOM.handFinger.style.top = (bp.top + 20) + "px";
              pressBtn();
            }, startTime + 1500);
            
            schedule(() => {
              DOM.handFinger.innerHTML = SVG_FINGER_TAP;
              DOM.handFinger.style.transition = "top 150ms ease-out";
              DOM.handFinger.style.top = bp.top + "px";
              releaseBtn();
            }, startTime + 1900);
            
            schedule(() => {
              DOM.handFinger.style.transition = "left 0.4s ease-in, opacity 0.3s";
              DOM.handFinger.style.left = "440px";
              DOM.handFinger.style.opacity = "0";
            }, startTime + 2100);
            
            schedule(() => showCheck(), startTime + 2500);
            schedule(() => hideCheck(), startTime + 2800);
            schedule(() => resetCheck(), startTime + 2900);
            
          } else {
            // ═══ NoGo 流程 ═══
            schedule(() => {
              resetFinger();
              DOM.handFinger.innerHTML = SVG_FINGER_TAP;
              requestAnimationFrame(() => {
                DOM.handFinger.style.opacity = "1";
                moveHandTo(DOM.handFinger, bp.left + 80, bp.top, 500, "cubic-bezier(0.6,0,0.4,1)");
              });
            }, startTime + 400);
            
            schedule(() => {
              resetStop();
              DOM.handStop.innerHTML = SVG_HAND_STOP;
              requestAnimationFrame(() => {
                DOM.handStop.style.opacity = "1";
                moveHandTo(DOM.handStop, bp.left - 10, bp.top - 20, 300, "cubic-bezier(0.2,0,0,1)");
                DOM.handStop.style.animation = "shakeHand 0.8s ease-in-out 1";
              });
              DOM.handFinger.style.transition = "left 0.4s cubic-bezier(0,0,0.6,1), opacity 0.3s";
              DOM.handFinger.style.left = "440px";
              DOM.handFinger.style.opacity = "0";
            }, startTime + 850);
            
            schedule(() => {
              DOM.handStop.style.animation = "none";
              DOM.handStop.style.transition = "left 0.4s ease-in, opacity 0.3s";
              DOM.handStop.style.left = "-100px";
              DOM.handStop.style.opacity = "0";
            }, startTime + 1900);
            schedule(() => resetStop(), startTime + 2300);
          }
          
          schedule(() => {
            DOM.stimulus.style.opacity = "0";
          }, startTime + 2800);
          
          schedule(() => {
            updateProgress(((idx + 1) / 6) * 46, "phase1");
          }, startTime + 2900);
        });
        
        schedule(() => {
          resetFinger();
          resetStop();
          resetCheck();
          DOM.stimulus.innerHTML = "";
        }, 19000);
      }

      /* ============================================================
         🎬 中段：順序引導（19s ~ 24s）
      ============================================================ */
      function playPhase2() {
        schedule(() => {
          DOM.phaseLabel.textContent = "── 中段：記住這個順序 ──";
          DOM.btn.style.opacity = "0.3";
        }, 19000);
        
        for (let i = 0; i < 6; i++) {
          schedule(() => {
            DOM.slots[i].classList.add("glow-green", "wiggle");
            updateProgress(46 + ((i + 1) / 6) * 12, "phase2");
          }, 19500 + i * 600);
          
          schedule(() => {
            DOM.slots[i].classList.remove("wiggle");
          }, 19800 + i * 600);
        }
        
        schedule(() => {
          DOM.slots.forEach(slot => slot.classList.add("pulse"));
        }, 23000);
        schedule(() => {
          DOM.slots.forEach(slot => slot.classList.remove("pulse"));
        }, 23500);
        
        schedule(() => {
          DOM.slots.forEach(slot => {
            slot.classList.remove("glow-green");
            slot.classList.add("flipped");
          });
        }, 23500);
        
        schedule(() => {
          DOM.phaseLabel.textContent = "";
          updateProgress(58, "phase2");
        }, 24000);
      }

      /* ============================================================
         🎬 後段：操作示範（24.5s ~ 41.5s）
      ============================================================ */
      function playPhase3() {
        schedule(() => {
          DOM.gameArea.style.opacity = "0";
          DOM.phaseLabel.textContent = "── 後段：示範作答 ──";
        }, 24500);
        
        schedule(() => {
          DOM.answerArea.classList.add("show");
          resetAnswerArea();
          updateProgress(60, "phase3");
        }, 25000);

        // 點選示範：1🧀 2😺 3🧀 4😺 5🧀 6🧀
        const clickPlan = [
          { box: 0, clicks: 1, targetState: 1 },
          { box: 1, clicks: 2, targetState: 2 },
          { box: 2, clicks: 1, targetState: 1 },
          { box: 3, clicks: 2, targetState: 2 },
          { box: 4, clicks: 1, targetState: 1 },
          { box: 5, clicks: 1, targetState: 1 },
        ];
        
        let baseTime = 25500;
        
        clickPlan.forEach((plan, planIdx) => {
          const boxPos = () => getAnswerBoxCenter(plan.box);
          
          schedule(() => {
            resetFinger();
            DOM.handFinger.innerHTML = SVG_FINGER_TAP;
            requestAnimationFrame(() => {
              DOM.handFinger.style.opacity = "1";
              const pos = boxPos();
              moveHandTo(DOM.handFinger, pos.left, pos.top, 600);
            });
          }, baseTime);
          
          for (let c = 0; c < plan.clicks; c++) {
            const clickTime = baseTime + 800 + c * 700;
            
            schedule(() => {
              DOM.handFinger.innerHTML = SVG_HAND2_CLICK;
              DOM.ansBoxes[plan.box].classList.add("pressed");
              
              answerStates[plan.box] = (answerStates[plan.box] + 1) % 3;
              const state = answerStates[plan.box];
              const content = DOM.ansContents[plan.box];
              
              if (state === 0) {
                content.innerHTML = "❓";
                content.className = "box-content question";
              } else if (state === 1) {
                content.innerHTML = SVG_CHEESE;
                content.className = "box-content";
              } else {
                content.innerHTML = SVG_CAT;
                content.className = "box-content";
              }
            }, clickTime);
            
            schedule(() => {
              DOM.handFinger.innerHTML = SVG_FINGER_TAP;
              DOM.ansBoxes[plan.box].classList.remove("pressed");
              DOM.ansBoxes[plan.box].classList.add("selected");
            }, clickTime + 200);
          }
          
          baseTime += 800 + plan.clicks * 700 + 300;
          
          schedule(() => {
            updateProgress(60 + ((planIdx + 1) / 6) * 30, "phase3");
          }, baseTime);
        });
        
        schedule(() => {
          DOM.handFinger.style.transition = "left 0.4s ease-in, opacity 0.3s";
          DOM.handFinger.style.left = "440px";
          DOM.handFinger.style.opacity = "0";
        }, 36000);
        
        schedule(() => {
          resetFinger();
          DOM.handFinger.innerHTML = SVG_FINGER_TAP;
          requestAnimationFrame(() => {
            DOM.handFinger.style.opacity = "1";
            const pos = getConfirmBtnCenter();
            moveHandTo(DOM.handFinger, pos.left, pos.top, 600);
          });
        }, 36500);
        
        schedule(() => {
          DOM.handFinger.innerHTML = SVG_HAND2_CLICK;
          DOM.btnConfirm.classList.add("pressed");
        }, 37300);
        
        schedule(() => {
          DOM.handFinger.innerHTML = SVG_FINGER_TAP;
          DOM.btnConfirm.classList.remove("pressed");
          DOM.handFinger.style.transition = "left 0.4s ease-in, opacity 0.3s";
          DOM.handFinger.style.left = "440px";
          DOM.handFinger.style.opacity = "0";
        }, 37700);
        
        schedule(() => {
          DOM.resultFeedback.classList.add("show");
          updateProgress(100, "phase3");
        }, 38000);
        
        schedule(() => {
          DOM.resultFeedback.classList.remove("show");
          DOM.answerArea.style.opacity = "0";
        }, 40500);
      }

      /* ============================================================
         🔄 主循環
      ============================================================ */
      const TOTAL_DURATION = 41500;
      
      function startCycle() {
        clearAllTimers();
        resetAll();
        document.getElementById("guideDoneOverlay").classList.remove("show");
        
        DOM.bgLayer.innerHTML = SVG_MOUSE_HOLE;
        DOM.handFinger.innerHTML = SVG_FINGER_TAP;
        DOM.handStop.innerHTML = SVG_HAND_STOP;
        
        playPhase1();
        playPhase2();
        playPhase3();
        
        schedule(() => showDoneOverlay(), TOTAL_DURATION);
      }
      
      function showDoneOverlay() {
        clearAllTimers();
        resetAll();
        document.getElementById("guideDoneOverlay").classList.add("show");
      }

      /* ============================================================
         🎛️ 事件綁定
      ============================================================ */
      document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("btnGuideReady").addEventListener("click", function() {
          clearAllTimers();
          if (window.parent !== window) {
            window.parent.postMessage({ type: "guide-ready" }, "*");
          }
        });
        
        document.getElementById("btnGuideReplay").addEventListener("click", function() {
          startCycle();
        });
        
        document.getElementById("btnGuideSkip").addEventListener("click", function() {
          clearAllTimers();
          if (window.parent !== window) {
            window.parent.postMessage({ type: "guide-ready" }, "*");
          }
        });
        
        startCycle();
      });

      window.addEventListener("message", function(e) {
        if (e.data && e.data.type === "init") {
          document.getElementById("btnGuideSkip").style.display = "block";
        }
        if (e.data && e.data.type === "stop") {
          clearAllTimers();
        }
      });
    </script>
  </body>
</html>
